[workspace]
name = "youtube-subscription-game"
version = "0.1.0"
description = "SubRush — a turn-based YouTube subscription idle game"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.12"
pytest = ">=7.0"

[pypi-dependencies]
transcrypt = ">=3.9"
playwright = ">=1.60.0, <2"

[tasks]
test  = "pytest tests/ -v"
build = "make build"
